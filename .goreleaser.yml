version: 2

project_name: figma-kit

builds:
  - main: ./cmd/figma-kit
    binary: figma-kit
    ldflags:
      - -s -w -X github.com/dop-amine/figma-kit/internal/cli.Version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - repository:
      owner: dop-amine
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/dop-amine/figma-kit
    description: CLI for programmatic Figma design via the MCP server
    license: MIT
    install: |
      bin.install "figma-kit"
